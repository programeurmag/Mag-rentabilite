name: Rapport de rentabilité hebdomadaire

on:
  schedule:
    # 5h00 AM heure de Montréal en hiver (EST, UTC-5) -> 6h00 AM en été (EDT, UTC-4).
    # Cron GitHub Actions ne gère pas le changement d'heure automatiquement (voir spec 1.8) :
    # ajuster cette valeur (ou en ajouter une deuxième) si le décalage d'une heure en été dérange.
    - cron: "0 10 * * 1"
  workflow_dispatch: {} # permet de lancer le rapport manuellement depuis l'onglet Actions

permissions:
  contents: write # nécessaire pour committer l'historique (Phase 2, voir dernière étape)

jobs:
  rapport:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: python -m pip install -r requirements.txt

      - name: Générer et envoyer le rapport
        working-directory: .
        env:
          JOBBER_CLIENT_ID: ${{ secrets.JOBBER_CLIENT_ID }}
          JOBBER_CLIENT_SECRET: ${{ secrets.JOBBER_CLIENT_SECRET }}
          JOBBER_REFRESH_TOKEN: ${{ secrets.JOBBER_REFRESH_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          # Phase 2, optionnel : si absente/invalide, le rapport part quand même,
          # juste sans la section analyse IA (voir src/analyse_claude.py).
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python src/generer_rapport.py

      - name: Conserver l'Excel généré
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rapport-excel
          path: outputs/*.xlsx
          retention-days: 90

      - name: Committer l'historique de la semaine (Phase 2)
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p historique
          git add -A historique
          git diff --cached --quiet || git commit -m "Historique semaine du $(date +%F)"
          git push
